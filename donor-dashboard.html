<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donor Dashboard - Stranger to Friends</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }
        .dashboard-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            margin: 20px 0;
        }
        .online { background: #d4edda; color: #155724; }
        .offline { background: #f8d7da; color: #721c24; }
        .toggle-btn {
            background: #ff4b2b;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        /* Call Modal */
        #callModal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 1000;
        }
        .modal-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .accept { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .decline { background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <h2>Welcome, <span id="donorName">Donor</span></h2>
        <p>📞 Phone: <span id="donorPhone">-</span></p>
        <p>🩸 Blood Group: <span id="bloodGroup">-</span></p>
        
        <div id="statusBadge" class="status-badge offline">Offline</div>
        
        <button id="toggleOnline" class="toggle-btn">Go Online</button>
        
        <button id="editProfileBtn" class="toggle-btn" style="background: #007bff; margin-top: 15px;">✏️ Edit Profile</button>
        
        <a href="district-requests.html" style="display: block; text-decoration: none; margin-top: 15px;">
            <button type="button" class="toggle-btn" style="background: #333;">📋 District Blood Requests</button>
        </a>
        
        <p style="font-size: 12px; margin-top: 15px; color: #666;">
            When you are online, people in need can call you directly through the browser.
        </p>
        <hr style="border: none; border-top: 1px solid #eee; margin: 15px 0;">
        <p style="font-size: 12px; color: #666;">
            For reviews, feedback, and complaints, please email us at:<br>
            <a href="mailto:strangertofriend37@gmail.com" style="color: #007bff; text-decoration: none; font-weight: bold;">strangertofriend37@gmail.com</a>
        </p>
    </div>

    <!-- Active Call Banner -->
    <div id="activeCallBanner" style="display: none; background: #fff3f3; border: 2px solid #cc0000; border-radius: 20px; padding: 20px; margin-top: 15px; text-align: center; width: 400px; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <p style="margin: 0 0 15px 0; color: #cc0000; font-weight: bold; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px;">🔴 <span id="callStatusText">In Active Call</span></p>
        <button id="endCallBtn" style="background: #dc3545; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; width: 100%;">🔴 End Call</button>
    </div>

    <div id="callModal">
        <h3 id="callerInfo">Incoming Call...</h3>
        <div class="modal-btns">
            <button class="accept" id="acceptCall">Accept</button>
            <button class="decline" id="declineCall">Decline</button>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editProfileModal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; box-shadow: 0 0 100px rgba(0,0,0,0.5); text-align: left; z-index: 1000; width: 350px;">
        <h3 style="text-align: center; margin-bottom: 20px;">✏️ Edit Profile</h3>
        <form id="editProfileForm">
            <label style="display:block; margin-top: 10px; font-size:13px; font-weight:bold;">Full Name</label>
            <input type="text" id="editFullName" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;" required>
            
            <label style="display:block; margin-top: 10px; font-size:13px; font-weight:bold;">Phone Number</label>
            <input type="text" id="editPhone" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;" required>
            
            <label style="display:block; margin-top: 10px; font-size:13px; font-weight:bold;">Blood Group</label>
            <select id="editBloodGroup" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;" required>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="A1B+">A1B+</option>
                <option value="AB-">AB-</option>
                <option value="A1B-">A1B-</option>
            </select>

            <label style="display:block; margin-top: 10px; font-size:13px; font-weight:bold;">City</label>
            <input type="text" id="editCity" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;" required>

            <label style="display:block; margin-top: 10px; font-size:13px; font-weight:bold;">State</label>
            <input type="text" id="editState" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;" required>

            <label style="display:block; margin-top: 10px; font-size:13px; font-weight:bold;">Zip Code</label>
            <input type="text" id="editZip" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;" required>

            <div class="modal-btns" style="margin-top: 20px;">
                <button type="submit" class="accept" style="background:#28a745; width:45%;">Save</button>
                <button type="button" class="decline" id="closeEditModal" style="background:#666; width:45%;">Cancel</button>
            </div>
        </form>
    </div>

    <audio id="remoteAudio" autoplay></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const donorData = JSON.parse(localStorage.getItem('donorInfo'));
        if (!donorData) window.location.href = 'STF login.html';

        document.getElementById('donorName').innerText = donorData.fullName;
        document.getElementById('donorPhone').innerText = donorData.phone;
        document.getElementById('bloodGroup').innerText = donorData.bloodGroup;

        // Edit Profile modal trigger & pre-population
        const editModal = document.getElementById('editProfileModal');
        document.getElementById('editProfileBtn').onclick = () => {
            document.getElementById('editFullName').value = donorData.fullName;
            document.getElementById('editPhone').value = donorData.phone;
            document.getElementById('editBloodGroup').value = donorData.bloodGroup;
            document.getElementById('editCity').value = donorData.city;
            document.getElementById('editState').value = donorData.state;
            document.getElementById('editZip').value = donorData.zipCode;
            editModal.style.display = 'block';
        };

        document.getElementById('closeEditModal').onclick = () => {
            editModal.style.display = 'none';
        };

        document.getElementById('editProfileForm').onsubmit = async (e) => {
            e.preventDefault();
            const updatedData = {
                fullName: document.getElementById('editFullName').value,
                phone: document.getElementById('editPhone').value,
                bloodGroup: document.getElementById('editBloodGroup').value,
                city: document.getElementById('editCity').value,
                state: document.getElementById('editState').value,
                zipCode: document.getElementById('editZip').value
            };

            try {
                const res = await fetch(`/api/donors/${donorData._id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });
                const result = await res.json();
                if (result.success) {
                    localStorage.setItem('donorInfo', JSON.stringify(result.donor));
                    alert('Profile updated successfully!');
                    window.location.reload();
                } else {
                    alert('Error updating profile: ' + (result.error || 'Unknown error'));
                }
            } catch (err) {
                alert('Network error updating profile.');
            }
        };

        const socket = io();
        let isOnline = localStorage.getItem('isOnline') === 'true'; // Load persistent state
        let peerConnection;
        let localStream;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        const toggleBtn = document.getElementById('toggleOnline');
        const statusBadge = document.getElementById('statusBadge');

        function updateUI() {
            toggleBtn.innerText = isOnline ? 'Go Offline' : 'Go Online';
            toggleBtn.style.background = isOnline ? '#666' : '#ff4b2b';
            statusBadge.innerText = isOnline ? 'Online' : 'Offline';
            statusBadge.className = 'status-badge ' + (isOnline ? 'online' : 'offline');
        }

        // Sync UI with initial state
        updateUI();

        if (isOnline && donorData) {
            socket.emit('donorOnline', donorData.phone);
        }
        // Handle auto-answer from global notification
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('answer') === 'true') {
            const pending = JSON.parse(localStorage.getItem('pendingCall'));
            if (pending) {
                setTimeout(() => {
                    handleIncomingCall(pending.signal, pending.from, pending.callerSocket);
                }, 500);
                localStorage.removeItem('pendingCall');
            }
        }

        socket.on('connect', () => {
            if (isOnline && donorData) socket.emit('donorOnline', donorData.phone);
        });

        socket.on('disconnect', () => {
            statusBadge.innerText = 'Disconnected';
            statusBadge.className = 'status-badge offline';
            statusBadge.style.border = 'none';
        });

        toggleBtn.onclick = () => {
            isOnline = !isOnline;
            localStorage.setItem('isOnline', isOnline); // Persist state
            if (isOnline) {
                socket.emit('donorOnline', donorData.phone);
            } else {
                socket.emit('donorOffline', donorData.phone);
            }
            updateUI();
        };

        // Shared function for answering calls
        async function handleIncomingCall(signal, from, callerSocket) {
            callerSocketId = callerSocket;
            document.getElementById('callModal').style.display = 'block';
            document.getElementById('callerInfo').innerText = `Incoming Call from ${from}`;

            document.getElementById('acceptCall').onclick = async () => {
                document.getElementById('callModal').style.display = 'none';
                document.getElementById('activeCallBanner').style.display = 'block';
                document.getElementById('callStatusText').innerText = 'In Call';
                
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                peerConnection = new RTCPeerConnection(config);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                peerConnection.ontrack = (event) => {
                    document.getElementById('remoteAudio').srcObject = event.streams[0];
                };

                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.emit('iceCandidate', { to: callerSocketId, candidate: event.candidate });
                    }
                };

                await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                socket.emit('answerCall', { signal: answer, to: callerSocketId });
            };
        }

        function endActiveCall() {
            document.getElementById('activeCallBanner').style.display = 'none';
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            const remoteAudio = document.getElementById('remoteAudio');
            if (remoteAudio) remoteAudio.srcObject = null;
        }

        document.getElementById('endCallBtn').onclick = () => {
            socket.emit('endCall');
            endActiveCall();
        };

        socket.on('callEnded', () => {
            document.getElementById('callStatusText').innerText = 'Call Ended';
            setTimeout(() => {
                endActiveCall();
            }, 1500);
        });

        let callerSocketId;
        socket.on('incomingCall', (data) => {
            handleIncomingCall(data.signal, data.from, data.callerSocket);
        });

        socket.on('iceCandidate', (candidate) => {
            if (peerConnection) peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        });

        document.getElementById('declineCall').onclick = () => {
            document.getElementById('callModal').style.display = 'none';
        };
    </script>
</body>
</html>
