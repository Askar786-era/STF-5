<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Request Blood</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="stylesheet" href="STF3.css">
</head>
<body>

    <!-- Top Header -->
    <div class="top-bar">
        <h3>Stranger to Friends</h3>
    </div>

    <!-- Center Form -->
    <div class="container">
        <div class="form-box">

            <div class="icon-box search">
                🔍
            </div>

            <h2>Request Blood</h2>
            <p class="subtitle">Find matching donors in your area</p>

            <form id="searchForm">

                <label>Patient Name</label>
                <input type="text" id="patientName" placeholder="Enter patient name" required>

                <label>Phone Number</label>
                <input type="tel" id="patientPhone" placeholder="Enter phone number" required>



                
                <label>Blood Group</label>
                <select id="searchBloodGroup" required>
                    <option value="">Select Blood Group</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="AB+">AB+</option>
                     <option value="A1B+">A1B+</option>
                    <option value="AB-">AB-</option>
                    <option value="A1B-">A1B-</option>
                </select>

                <div class="row">
                    <div class="col">
                        <label>City</label>
                        <input type="text" id="searchCity" placeholder="City" required>
                    </div>

                    <div class="col">
                        <label>State</label>
                        <input type="text" id="searchState" placeholder="State" required>
                    </div>

                    <div class="col">
                        <label>Zip Code (Optional)</label>
                        <input type="text" id="searchZip" placeholder="Zip Code">
                    </div>
                </div>

                <label>Hospital / Message (Optional)</label>
                <input type="text" id="requestMessage" placeholder="e.g. XYZ Hospital, Emergency Room">

                <button type="submit" class="search-btn">
                    🔍 Submit Request & Search Donors →
                </button>

            </form>
            
            <div id="searchResults" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>

</body>
</html>
